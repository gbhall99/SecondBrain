# SecondBrain configuration (Phase 1: capture + transcript).
# Copy to config.local.toml to override locally (gitignored), or edit in place.
# Environment variables override these with the prefix SB_ and "__" for nesting,
# e.g. SB_CAPTURE__INPUT_DEVICE="MacBook Microphone".

[paths]
# Base directory for all runtime data (gitignored). Relative paths resolve from
# the repo root.
data_dir = "data"

[capture]
# Audio input device name as shown by `sb devices`. Empty = system default.
input_device = ""
sample_rate = 16000            # 16 kHz mono is plenty for speech + small files
channels = 1
chunk_seconds = 60             # length of each rolling FLAC chunk
# Stop capture if free disk space falls below this many GB (disk guardrail).
min_free_disk_gb = 5.0

[consent]
# Master switch. When false, the daemon records nothing.
recording_enabled = true
# When true, capture is paused (menu bar / CLI toggle this).
paused = false
# Retention for RAW AUDIO after it has been transcribed. Transcripts are kept
# regardless. Set raw_audio_retention_hours = 0 to delete immediately after
# transcription, or a negative value to keep raw audio indefinitely.
raw_audio_retention_hours = 168    # 7 days
# Per-speaker opt-out (enforced once diarization lands in Phase 2). Names here
# will have their segments excluded/redacted.
speaker_opt_out = []

[vad]
# Drop audio with no detected speech so we never transcribe silence.
enabled = true
# Speech probability threshold (silero-vad). Higher = stricter.
threshold = 0.5
min_speech_ms = 250
min_silence_ms = 700

[transcription]
# Backend: "parakeet" | "whisper" | "mock". "mock" is for CI/dev on non-Mac.
backend = "parakeet"
whisper_model = "mlx-community/whisper-large-v3-turbo"
parakeet_model = "mlx-community/parakeet-tdt-0.6b-v2"
language = ""                  # empty = auto-detect

[search]
# Optional semantic search via sqlite-vec + local embeddings. Falls back to
# full-text-only if the extension or embedding model is unavailable.
semantic_enabled = true
embedding_model = "bge-small"

[api]
host = "127.0.0.1"             # local-only. Never bind to 0.0.0.0.
port = 8765

[security]
# Auth + at-rest encryption (Phase 5). Off by default. To reach the UI over
# Tailscale, either run `tailscale serve` to 127.0.0.1, or set api.host to the
# tannet IP AND require_auth=true (the server refuses a non-loopback bind without
# auth). Set the password with `sb auth set-password`.
require_auth = false
username = "owner"
session_max_age_days = 14
# SQLCipher database encryption. Needs `pip install -e ".[secure]"` and a
# passphrase — put it in config.local.toml or the SB_SECURITY__DB_PASSPHRASE env.
encrypt_db = false
db_passphrase = ""

[logging]
level = "INFO"

[proactive]
# Proactive engine (Phase 4): goals, nightly morning brief + weekly review,
# commitment tracking, connection discovery, and (opt-in) candid coaching.
# Disabled by default; enable on the Mac once extraction is running.
enabled = false
event_triggers = false         # real-time nudges for urgent (same-day) commitments
coaching_enabled = false       # candid, transcript-grounded team-member coaching
digest_hour = 6                # local hour to generate the morning brief
weekly_review_weekday = 0      # 0=Monday … 6=Sunday
top_n = 5                      # max suggestions surfaced per day
per_kind_cap = 2
recent_days = 1
lookback_days = 30
connection_threshold = 0.78
goal_link_threshold = 0.72
due_soon_days = 3
stale_goal_days = 14
stale_days = 21
confidence_floor = 0.4
suppress_days = 30
urgent_due_hours = 24

[llm]
# Local LLM for knowledge extraction + Q&A (Phase 3). Fully offline via Ollama.
# Set backend = "ollama" and run `ollama serve` + pull the model on the Mac.
backend = "mock"               # mock | ollama
model = "llama3.1:8b-instruct"
host = "http://127.0.0.1:11434"
temperature = 0.0
request_timeout_s = 120.0

[extraction]
# Knowledge graph + chat. Disabled by default; enable on the Mac once Ollama is up.
enabled = false
max_context_chars = 24000
overlap_segments = 1
entity_match_threshold = 0.82
entity_review_threshold = 0.70
chat_max_hops = 1
chat_max_facts = 40
chat_max_context_chars = 32000

[conversation]
# Ambient audio is continuous; we group consecutive chunks into "conversations"
# before diarizing them as a whole. A silence/idle gap larger than this closes
# the open conversation.
max_gap_minutes = 5.0
min_conversation_seconds = 5.0

[diarization]
# Speaker diarization + voice-profile learning (Phase 2). Fully local.
# Disabled by default; enable on the Mac mini once set up (see `sb speaker setup`).
enabled = false
backend = "pyannote"           # pyannote | mock
model = "pyannote/speaker-diarization-3.1"
# pyannote 3.1 models are GATED on HuggingFace. One-time setup: accept the model
# conditions while logged in, create a read token, and put it here in
# config.local.toml (gitignored) or set HF_TOKEN / HUGGINGFACE_TOKEN. Leave blank
# in this committed file.
hf_token = ""
embedding_dim = 256
match_threshold = 0.70
owner_match_threshold = 0.65
centroid_update_threshold = 0.75
cluster_distance_threshold = 0.30
low_confidence_threshold = 0.5
min_cluster_speech_s = 1.0
