name: Nightly real-backend tests

# Exercises the REAL local backends (Ollama LLM, pyannote diarization, MLX
# transcription, sqlite-vec) which the PR CI only mocks. Runs on a macOS
# (Apple Silicon) runner so MLX/pyannote can load. Opt-in: gated by SB_SLOW.
on:
  schedule:
    - cron: "0 7 * * *"   # 07:00 UTC nightly
  workflow_dispatch: {}

jobs:
  real-backends:
    runs-on: macos-14   # Apple Silicon
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install (all extras)
        run: |
          python -m pip install --upgrade pip
          brew install portaudio || true
          pip install -e ".[dev,audio,ml,mac,secure]"

      - name: Start Ollama + pull a small model
        run: |
          brew install ollama || true
          ollama serve &
          sleep 5
          ollama pull llama3.2:1b || true

      - name: Slow real-backend tests
        env:
          SB_SLOW: "1"
          SB_LLM__BACKEND: ollama
          SB_LLM__MODEL: llama3.2:1b
        run: pytest -m slow -v
