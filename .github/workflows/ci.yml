name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install (core + dev only; Apple/ML extras are platform-specific)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" -c constraints.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Migrations apply cleanly (alembic upgrade head)
        env:
          SB_PATHS__DATA_DIR: ${{ runner.temp }}/sb-data
        run: python -m alembic upgrade head

      - name: Tests (pytest, excluding slow real-backend suite)
        run: pytest -m "not slow"
