<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SecondBrain — Ask</title>
  <style>
    :root { color-scheme: light dark; }
    body { font-family: -apple-system, system-ui, sans-serif; max-width: 820px;
           margin: 0 auto; padding: 1.5rem; line-height: 1.55; }
    a { color: inherit; }
    form { display: flex; gap: .5rem; margin: 1rem 0; }
    input[type=text] { flex: 1; padding: .6rem; font-size: 1rem;
                       border: 1px solid #8884; border-radius: 8px; }
    button { padding: .6rem 1rem; border-radius: 8px; border: 1px solid #8884;
             cursor: pointer; background: #8882; }
    #answer { white-space: pre-wrap; border: 1px solid #8884; border-radius: 10px;
              padding: 1rem; margin: 1rem 0; min-height: 2rem; }
    .cite { border-bottom: 1px solid #8883; padding: .5rem 0; font-size: .9rem; }
    .meta { color: #888; font-size: .8rem; }
  </style>
</head>
<body>
  <h1>Ask your second brain</h1>
  <p class="meta"><a href="/">transcripts</a> · <a href="/speakers">speakers</a> ·
     <a href="/graph">graph</a></p>

  <form onsubmit="ask(event)">
    <input type="text" id="q" placeholder="e.g. What did Dana commit to?" autofocus />
    <button type="submit">Ask</button>
  </form>

  <div id="answer" class="meta">Answers are grounded in your captured knowledge, with sources.</div>
  <div id="cites"></div>

  <script>
    async function ask(e) {
      e.preventDefault();
      const q = document.getElementById('q').value.trim();
      if (!q) return;
      document.getElementById('answer').textContent = 'Thinking…';
      document.getElementById('cites').innerHTML = '';
      const r = await fetch('/api/ask', {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({question: q})
      });
      const d = await r.json();
      document.getElementById('answer').textContent = d.answer;
      document.getElementById('cites').innerHTML = d.citations.length
        ? '<h3>Sources</h3>' + d.citations.map(c => `
            <div class="cite">${escapeHtml(c.text)}
              <div class="meta">[${c.segment_id}] ${(c.start_at||'').slice(0,19)} — ${escapeHtml(c.speaker||'')}</div>
            </div>`).join('')
        : '<p class="meta">No grounded sources for this answer.</p>';
    }
    function escapeHtml(s){return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
  </script>
</body>
</html>
