<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SecondBrain — Goals</title>
  <style>
    :root { color-scheme: light dark; }
    body { font-family: -apple-system, system-ui, sans-serif; max-width: 820px;
           margin: 0 auto; padding: 1.5rem; line-height: 1.5; }
    a { color: inherit; }
    .meta { color: #888; font-size: .85rem; }
    .goal { border-bottom: 1px solid #8883; padding: .6rem 0; }
    input, textarea, select { padding: .45rem; border: 1px solid #8884; border-radius: 8px;
                              font: inherit; }
    button { padding: .45rem .8rem; border-radius: 8px; border: 1px solid #8884;
             cursor: pointer; background: #8882; }
    form { display: grid; gap: .5rem; max-width: 480px; margin: 1rem 0; }
    .done { text-decoration: line-through; color: #888; }
  </style>
</head>
<body>
  <h1>Goals</h1>
  <p class="meta"><a href="/">transcripts</a> · <a href="/brief">brief</a> ·
     <a href="/chat">ask</a></p>

  <form onsubmit="addGoal(event)">
    <input type="text" id="title" placeholder="Goal title" required />
    <textarea id="description" placeholder="Description (helps auto-linking)"></textarea>
    <div>
      <input type="date" id="target_date" />
      <select id="priority">
        <option value="1">High</option>
        <option value="2" selected>Medium</option>
        <option value="3">Low</option>
      </select>
      <button type="submit">Add goal</button>
    </div>
  </form>

  {% for g in goals %}
    <div class="goal" id="goal-{{ g.id }}">
      <strong class="{{ 'done' if g.status in ['done','dropped'] else '' }}">{{ g.title }}</strong>
      <span class="meta">· P{{ g.priority }} · {{ g.status }}{% if g.target_date %} · by {{ g.target_date }}{% endif %}</span>
      {% if g.description %}<div class="meta">{{ g.description }}</div>{% endif %}
      <div>
        <button onclick="setStatus({{ g.id }}, 'done')">Done</button>
        <button onclick="setStatus({{ g.id }}, 'paused')">Pause</button>
        <button onclick="setStatus({{ g.id }}, 'active')">Activate</button>
        <button onclick="delGoal({{ g.id }})">Delete</button>
      </div>
    </div>
  {% endfor %}

  <script>
    async function addGoal(e) {
      e.preventDefault();
      await fetch('/api/goals', {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          title: title.value, description: description.value || null,
          target_date: target_date.value || null, priority: parseInt(priority.value)
        })
      });
      location.reload();
    }
    async function setStatus(id, status) {
      await fetch(`/api/goals/${id}/status`, {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({status})
      });
      location.reload();
    }
    async function delGoal(id) {
      await fetch(`/api/goals/${id}`, {method: 'DELETE'});
      document.getElementById('goal-' + id).remove();
    }
  </script>
</body>
</html>
